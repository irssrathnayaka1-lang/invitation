<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>[Official Invitation] - රුවන්පුර අධ්‍යාපන විද්‍යාපීඨය</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@500;700;800&family=Noto+Sans+Sinhala:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --royal-blue: #0f172a;
            --navy-blue: #1e3a8a;
            --gold: #d97706;
            --light-gold: #f59e0b;
            --bg-color: #f1f5f9;
            --text-dark: #334155;
            --text-light: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Noto Sans Sinhala', sans-serif;
            perspective: 1000px;
        }

        /* ---------------- Animation Scene ---------------- */
        .scene {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ---------------- Envelope Styles ---------------- */
        .envelope-wrapper {
            position: absolute;
            width: 340px;
            height: 230px;
            z-index: 10;
            cursor: pointer;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        /* When envelope fades out */
        .envelope-wrapper.fade-out {
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px) scale(0.95);
        }

        .env-back {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #1e293b;
            border-radius: 8px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.6);
            z-index: 1;
        }

        .env-flap {
            position: absolute;
            top: 0; left: 0;
            width: 0; height: 0;
            border-left: 170px solid transparent;
            border-right: 170px solid transparent;
            border-top: 130px solid #334155;
            transform-origin: top;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 4;
        }

        .env-front {
            position: absolute;
            bottom: 0; left: 0;
            width: 0; height: 0;
            border-left: 170px solid transparent;
            border-right: 170px solid transparent;
            border-bottom: 125px solid #0f172a;
            border-radius: 0 0 8px 8px;
            z-index: 3;
        }

        /* Flap Open Animation */
        .envelope-wrapper.open .env-flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        /* ---------------- Card Styles ---------------- */
        .card-container {
            position: absolute;
            width: 310px;
            height: 460px;
            z-index: 2; /* Initially inside envelope */
            transform: translateY(10px) scale(0.85);
            transition: transform 1s cubic-bezier(0.34, 1.56, 0.64, 1), z-index 0s;
            transform-style: preserve-3d;
            cursor: default;
            opacity: 0;
        }

        /* Step 1: Emerge from envelope */
        .card-container.emerge {
            opacity: 1;
            transform: translateY(-180px) scale(0.85);
            z-index: 20; /* Come in front of envelope */
        }

        /* Step 2: Center on screen for reading */
        .card-container.center {
            transform: translateY(0) scale(1);
            cursor: pointer; /* Now clickable to flip */
        }

        /* Step 3: Flip */
        .card-container.flipped {
            transform: translateY(0) scale(1) rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border: 6px solid #f8fafc;
            outline: 2px solid #cbd5e1;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Front of Card */
        .card-front {
            background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
            justify-content: center;
            text-align: center;
        }

        .logo-box {
            width: 90px;
            height: 90px;
            margin-bottom: 20px;
            border-radius: 50%;
            /* Gold border for logo */
            border: 3px solid var(--light-gold);
            padding: 3px;
            box-shadow: 0 5px 15px rgba(217, 119, 6, 0.3);
        }

        /* Base64 Logo settings */
        .logo-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
        }

        .card-front h1 {
            font-family: 'Abhaya Libre', serif;
            font-size: 28px;
            font-weight: 800;
            color: var(--navy-blue);
            margin-bottom: 5px;
            line-height: 1.2;
        }

        .card-front h3 {
            font-family: 'Abhaya Libre', serif;
            font-size: 18px;
            color: var(--gold);
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 40px;
        }

        .hint-text {
            font-size: 12px;
            color: var(--text-light);
            animation: pulse 2s infinite;
            background: #f1f5f9;
            padding: 8px 15px;
            border-radius: 20px;
        }

        /* Back of Card */
        .card-back {
            transform: rotateY(180deg);
            background: #ffffff;
            justify-content: flex-start;
        }

        .salutation {
            text-align: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e2e8f0;
            width: 100%;
        }

        .salutation h2 {
            font-family: 'Abhaya Libre', serif;
            font-size: 22px;
            color: var(--navy-blue);
            font-weight: 800;
            line-height: 1.3;
        }

        .salutation p {
            font-size: 13px;
            color: var(--text-light);
            margin-top: 5px;
        }

        .invitation-body {
            font-size: 14px;
            color: var(--text-dark);
            text-align: center;
            line-height: 1.8;
            margin-bottom: 25px;
        }

        .details-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            width: 100%;
            padding: 15px;
            margin-top: auto;
            margin-bottom: 10px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .detail-row:last-child { margin-bottom: 0; }
        
        .d-label { font-weight: 600; color: var(--navy-blue); }
        .d-value { font-weight: 500; color: var(--text-dark); text-align: right; }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        /* Instruction Overlay */
        #instruction {
            position: absolute;
            top: 50px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            transition: opacity 0.5s;
        }
    </style>
</head>

                <h1>Batch Photo</h1>
                <h3>22-24 අධ්‍යයන වර්ෂය</h3>
                <div class="hint-text">Tap to see details</div>
            </div>

            <div class="card-face card-back">
                <div class="salutation">
                    <h2 id="lbl-name">ගෞරවනීය කථිකාචාර්යතුමනි</h2>
                    <p id="lbl-post">රුවන්පුර ජාතික අධ්‍යාපන විද්‍යාපීඨය</p>
                </div>
                
                <div class="invitation-body" id="lbl-msg">
                    ඔබව සාදරයෙන් ආරාධනා කර සිටිමු.
                </div>

                <div class="details-box">
                    <div class="detail-row">
                        <span class="d-label">දිනය :</span>
                        <span class="d-value" id="lbl-date">-</span>
                    </div>
                    <div class="detail-row">
                        <span class="d-label">වේලාව :</span>
                        <span class="d-value" id="lbl-time">-</span>
                    </div>
                    <div class="detail-row">
                        <span class="d-label">ස්ථානය :</span>
                        <span class="d-value" id="lbl-venue">-</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let step = 0;

        function openEnvelope() {
            if (step === 0) {
                step = 1;
                // 1. Open flap
                document.getElementById('envelope').classList.add('open');
                document.getElementById('instruction').style.opacity = '0';
                
                // 2. Slide card up (out of envelope)
                setTimeout(() => {
                    document.getElementById('card').classList.add('emerge');
                }, 500);

                // 3. Fade out envelope & Center card on screen
                setTimeout(() => {
                    document.getElementById('envelope').classList.add('fade-out');
                    document.getElementById('card').classList.add('center');
                    
                    // Show flip instruction after centering
                    setTimeout(() => {
                        document.getElementById('instruction').innerText = "පිටුපස බැලීමට කාඩ්පත මත ක්ලික් කරන්න";
                        document.getElementById('instruction').style.opacity = '1';
                    }, 800);
                    
                    step = 2; // Card is ready to be flipped
                }, 1500);
            }
        }

        function flipCard() {
            // Only allow flipping after the envelope has disappeared and card is centered
            if (step === 2) {
                document.getElementById('card').classList.toggle('flipped');
                document.getElementById('instruction').style.opacity = '0'; // Hide instruction
            }
        }

        // Data Decoding (From Admin Panel Generator)
        window.onload = function() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const encodedData = urlParams.get('q');
                
                if (encodedData) {
                    const jsonString = decodeURIComponent(atob(encodedData).split('').map(function(c) {
                        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                    }).join(''));

                    const data = JSON.parse(jsonString);

                    if(data.n) document.getElementById('lbl-name').innerText = data.n;
                    if(data.p) document.getElementById('lbl-post').innerText = data.p;
                    if(data.m) document.getElementById('lbl-msg').innerText = data.m;
                    if(data.d) document.getElementById('lbl-date').innerText = data.d;
                    if(data.t) document.getElementById('lbl-time').innerText = data.t;
                    if(data.v) document.getElementById('lbl-venue').innerText = data.v;
                }
            } catch(e) {
                console.error("Data error:", e);
            }
        };
    </script>
